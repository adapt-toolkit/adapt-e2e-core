# cbindgen configuration — generates include/adapt_e2e_core.h from the
# `#[no_mangle] extern "C"` surface in src/ffi.rs and the E2eRc enum (SPEC §2).
language = "C"
pragma_once = true
include_guard = "ADAPT_E2E_CORE_H"
autogen_warning = "/* GENERATED by cbindgen from adapt-e2e-core. DO NOT EDIT. */"
header = "/* adapt-e2e-core — C-ABI (Apache-2.0). See docs/SPEC.md. */"
cpp_compat = true
style = "tag"
usize_is_size_t = true
documentation = true
documentation_style = "doxy"

[export]
include = ["E2eRc"]

[enum]
rename_variants = "QualifiedScreamingSnakeCase"

[parse]
parse_deps = false
